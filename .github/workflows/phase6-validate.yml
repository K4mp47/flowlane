name: Validate phase 6 UI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - refactor/phase-6-ui-system
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          echo "code=$?" >> "$GITHUB_OUTPUT"
          tail -n 100 lint.log
          exit 0
      - name: Build
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          echo "code=$?" >> "$GITHUB_OUTPUT"
          tail -n 120 build.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase6-validation-logs
          path: |
            lint.log
            build.log
          if-no-files-found: ignore
      - name: Publish diagnostics
        if: (steps.lint.outputs.code != '0' || steps.build.outputs.code != '0') && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Phase 6 validation diagnostics'
            echo
            echo '**Lint**'
            echo '```text'
            tail -n 100 lint.log
            echo '```'
            echo
            echo '**Build**'
            echo '```text'
            tail -n 120 build.log
            echo '```'
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md
      - name: Enforce validation
        if: steps.lint.outputs.code != '0' || steps.build.outputs.code != '0'
        run: exit 1
