name: Bootstrap phase 6 dependencies

on:
  push:
    branches:
      - refactor/phase-6-ui-system
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/phase-6-ui-system
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install @base-ui/react motion class-variance-authority clsx tailwind-merge
      - name: Commit dependency lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add phase 6 UI dependencies"
          git push origin HEAD:refactor/phase-6-ui-system
