name: Validate domain calendar branch

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/domain-navigation-calendar
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
