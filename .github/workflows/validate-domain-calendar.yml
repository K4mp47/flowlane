name: Validate domain calendar branch

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/domain-navigation-calendar
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Build and capture diagnostics
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          tail -n 80 build.log
          exit 0
      - name: Publish build failure
        if: steps.build.outputs.code != '0' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Build diagnostics'
            echo
            echo '```text'
            tail -n 80 build.log
            echo '```'
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md
          exit 1
      - name: Fail push validation when build fails
        if: steps.build.outputs.code != '0' && github.event_name != 'pull_request'
        run: exit 1
