name: Phase 6 UI codemod

on:
  push:
    branches:
      - refactor/phase-6-ui-system
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/phase-6-ui-system
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Redirect Astryx imports to FlowLane UI
        run: |
          python - <<'PY'
          from pathlib import Path
          for path in Path('src').rglob('*'):
              if path.suffix not in {'.ts', '.tsx'}:
                  continue
              text = path.read_text()
              text = text.replace("@astryxdesign/core/", "@/components/ui/")
              path.write_text(text)

          main = Path('src/main.tsx')
          text = main.read_text()
          text = text.replace("import '@astryxdesign/core/reset.css'\n", '')
          text = text.replace("import '@astryxdesign/core/astryx.css'\n", '')
          if "import './design-system.css'" not in text:
              text = text.replace("import './product-v2.css'\n", "import './product-v2.css'\nimport './design-system.css'\n")
          main.write_text(text)
          PY
      - run: npm uninstall @astryxdesign/core @astryxdesign/theme-neutral
      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src package.json package-lock.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Migrate app imports to FlowLane UI"
          git push origin HEAD:refactor/phase-6-ui-system
